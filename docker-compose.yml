version: "3.9"

services:

  postgres:
    image: postgres:16
    container_name: mycrawler-postgres
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-agentsdb}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5

  webapi:
    build:
      context: .
      dockerfile: AgentsAPI.WebAPI/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__Postgres=Host=postgres;Port=5432;Database=${POSTGRES_DB:-agentsdb};Username=${POSTGRES_USER:-postgres};Password=${POSTGRES_PASSWORD:-postgres}

  cronscheduler:
    build:
      context: .
      dockerfile: AgentsAPI.CronScheduler/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - POSTGRES_CONNECTION=Host=postgres;Port=5432;Database=${POSTGRES_DB:-agentsdb};Username=${POSTGRES_USER:-postgres};Password=${POSTGRES_PASSWORD:-postgres}
      - CRON_EXPRESSION=0 0 * * *
      - CRAWL_QUERIES=example

volumes:
  pgdata: