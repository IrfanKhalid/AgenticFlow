services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: agentsdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  webapi:
    build:
      context: .
      dockerfile: AgentsAPI.WebAPI/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - ConnectionStrings__Postgres=Host=postgres;Database=agentsdb;Username=postgres;Password=postgres
    ports:
      - "8080:8080"

  migrate:
    image: mcr.microsoft.com/dotnet/sdk:9.0
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - .:/src
    working_dir: /src
    command: >
      sh -c "
      dotnet tool install --global dotnet-ef --version 8.0.0 &&
      /root/.dotnet/tools/dotnet-ef database update
      --project AgentsAPI.DataAccess
      --startup-project AgentsAPI.WebAPI
      "
    environment:
      - ConnectionStrings__Postgres=Host=postgres;Database=agentsdb;Username=postgres;Password=postgres

  cronscheduler:
    build:
      context: .
      dockerfile: AgentsAPI.CronScheduler/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - POSTGRES_CONNECTION=Host=postgres;Database=agentsdb;Username=postgres;Password=postgres
      - CRON_EXPRESSION=0 0 * * *
      - CRAWL_QUERIES=example

volumes:
  pgdata: