version: "3.9"

services:

  postgres:
    image: postgres:16
    container_name: mycrawler-postgres
    restart: always
    environment:
      POSTGRES_DB: deployAgentsDB
      POSTGRES_USER: deployAgentsUser
      POSTGRES_PASSWORD: 7iz2ZRL+Tkm&qiD
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U deployAgentsUser"]
      interval: 5s
      timeout: 5s
      retries: 5

  webapi:
    build:
      context: .
      dockerfile: AgentsAPI.WebAPI/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__Postgres=Host=postgres;Port=5432;Database=deployAgentsDB;Username=deployAgentsUser;Password=7iz2ZRL+Tkm&qiD

  cronscheduler:
    build:
      context: .
      dockerfile: AgentsAPI.CronScheduler/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - POSTGRES_CONNECTION=Host=postgres;Port=5432;Database=deployAgentsDB;Username=deployAgentsUser;Password=7iz2ZRL+Tkm&qiD
      - CRON_EXPRESSION=0 0 * * *
      - CRAWL_QUERIES=example

volumes:
  pgdata: