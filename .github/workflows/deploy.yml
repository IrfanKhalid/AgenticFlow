name: Deploy .NET Crawler to VPS

on:
  push:
    branches: [ scrape1.0 ]  # Trigger on pushes to scrape1.0 branch
  workflow_dispatch:  # Allow manual triggering

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: env

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create deployment package
        run: |
          tar -czf deploy-package.tar.gz \
            --exclude='.git' \
            --exclude='*/obj' \
            --exclude='*/bin' \
            --exclude='*.user' \
            --exclude='./deploy-package.tar.gz' \
            . || [ $? -eq 1 ]

      - name: Copy files to VPS via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          source: "deploy-package.tar.gz"
          target: "/tmp/"

      - name: Deploy on VPS via SSH
        env:
          DEPLOY_ENV_FILE: ${{ secrets.DEPLOY_ENV_FILE }}
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          timeout: 20m
          envs: DEPLOY_ENV_FILE
          script: |
            # Create app directory if it doesn't exist
            mkdir -p /var/my-crawler

            # Extract new version
            cd /tmp
            tar -xzf deploy-package.tar.gz -C /var/my-crawler/

            cd /var/my-crawler

            # Write compose variables for deployment
            if [ -z "$DEPLOY_ENV_FILE" ]; then
              echo "DEPLOY_ENV_FILE secret is missing or empty"
              exit 1
            fi
            printf "%s\n" "$DEPLOY_ENV_FILE" > .env

            # Start postgres and wait for it to be healthy
            # docker compose up -d postgres
            docker compose run --rm migrate

            # Build the CronScheduler image and start it
            docker compose up -d --build cronscheduler

            # Clean up
            rm /tmp/deploy-package.tar.gz
