services:
  webapi:
    build:
      context: .
      dockerfile: AgentsAPI.WebAPI/Dockerfile
    restart: unless-stopped
    ports:
      - "8080:8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - POSTGRES_CONNECTION=Host=host.docker.internal;Database=agentsdb;Username=postgres;Password=postgres
      - ConnectionStrings__Postgres=Host=host.docker.internal;Database=agentsdb;Username=postgres;Password=postgres

  migrate:
    image: mcr.microsoft.com/dotnet/sdk:9.0
    volumes:
      - .:/src
    working_dir: /src
    command: sh -c "dotnet tool install --global dotnet-ef --version 8.0.0 && /root/.dotnet/tools/dotnet-ef database update --project AgentsAPI.DataAccess --startup-project AgentsAPI.WebAPI"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - ConnectionStrings__Postgres=Host=host.docker.internal;Database=agentsdb;Username=postgres;Password=postgres

  cronscheduler:
    build:
      context: .
      dockerfile: AgentsAPI.CronScheduler/Dockerfile
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - POSTGRES_CONNECTION=Host=host.docker.internal;Database=agentsdb;Username=postgres;Password=postgres
      - CRON_EXPRESSION=0 0 * * *
      - CRAWL_QUERIES=example
